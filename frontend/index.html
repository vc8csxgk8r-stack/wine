<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cave à Vin — Ma Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bordeaux: #6B1C2A;
            --bordeaux-light: #8B2535;
            --bordeaux-deep: #3D0A14;
            --or: #C9A84C;
            --or-light: #E8C97A;
            --creme: #F5EDD6;
            --creme-dark: #E8D8B0;
            --noir: #0D0608;
            --gris: #1A0F12;
            --gris-moyen: #2E1A1F;
            --gris-clair: #4A2E35;
            --text-main: #F0E6D3;
            --text-muted: #A89080;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--noir);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(107,28,42,0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.08) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.01'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 3rem;
            border-bottom: 1px solid rgba(201,168,76,0.2);
            background: rgba(13,6,8,0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            font-size: 2rem;
            filter: drop-shadow(0 0 10px rgba(201,168,76,0.5));
        }

        .logo-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--creme);
            letter-spacing: 0.05em;
        }

        .logo-text span {
            font-size: 0.75rem;
            color: var(--or);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .header-stats {
            display: flex;
            gap: 2.5rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--or);
            display: block;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
        }

        .btn-add {
            background: linear-gradient(135deg, var(--bordeaux) 0%, var(--bordeaux-light) 100%);
            color: var(--creme);
            border: 1px solid rgba(201,168,76,0.3);
            padding: 0.7rem 1.8rem;
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
        }

        .btn-add:hover {
            background: linear-gradient(135deg, var(--bordeaux-light) 0%, #A03040 100%);
            box-shadow: 0 0 20px rgba(107,28,42,0.6);
            transform: translateY(-1px);
        }

        /* Main layout */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 3rem;
        }

        /* Filtres */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(74,46,53,0.6);
            padding: 0.5rem 1.2rem;
            font-family: 'Crimson Pro', serif;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.25s;
        }

        .filter-btn.active, .filter-btn:hover {
            color: var(--or);
            border-color: var(--or);
            background: rgba(201,168,76,0.07);
        }

        .search-box {
            background: var(--gris-moyen);
            border: 1px solid rgba(74,46,53,0.6);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            width: 250px;
            margin-left: auto;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--or);
        }

        .search-box::placeholder { color: var(--text-muted); }

        /* Grille des vins */
        .wine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .wine-card {
            background: linear-gradient(145deg, var(--gris) 0%, var(--gris-moyen) 100%);
            border: 1px solid rgba(74,46,53,0.5);
            padding: 1.5rem;
            position: relative;
            transition: all 0.35s;
            cursor: pointer;
            overflow: hidden;
        }

        .wine-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--or) 0%, var(--bordeaux) 100%);
        }

        .wine-card:hover {
            border-color: rgba(201,168,76,0.4);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .wine-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .wine-type-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 0.25rem 0.6rem;
            border: 1px solid;
        }

        .badge-rouge { color: #E05060; border-color: rgba(224,80,96,0.4); background: rgba(224,80,96,0.08); }
        .badge-blanc { color: #E8C97A; border-color: rgba(232,201,122,0.4); background: rgba(232,201,122,0.08); }
        .badge-rose { color: #E8A0A0; border-color: rgba(232,160,160,0.4); background: rgba(232,160,160,0.08); }
        .badge-mousseux { color: #A0D8E8; border-color: rgba(160,216,232,0.4); background: rgba(160,216,232,0.08); }

        .wine-qty {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .wine-qty span {
            color: var(--or);
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
        }

        .wine-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--creme);
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }

        .wine-millesime {
            font-size: 1.8rem;
            font-family: 'Playfair Display', serif;
            color: var(--or);
            font-weight: 700;
            float: right;
            margin-top: -0.5rem;
            text-shadow: 0 0 20px rgba(201,168,76,0.3);
        }

        .wine-region {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        /* Barre de maturité */
        .maturite-section {
            margin: 1rem 0;
        }

        .maturite-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .maturite-status {
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }

        .maturite-age {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .maturite-bar-bg {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .maturite-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.8s ease;
        }

        .maturite-apogee {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        /* Score millésime */
        .millesime-score {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.6rem;
        }

        .score-stars {
            color: var(--or);
            font-size: 0.8rem;
        }

        .score-number {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Prix */
        .wine-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(74,46,53,0.4);
        }

        .wine-prix {
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .prix-marche {
            font-size: 1.05rem;
            color: var(--or-light);
        }

        .prix-marche-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            font-family: 'Crimson Pro', serif;
        }

        .prix-achat {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .prix-achat span {
            color: var(--text-main);
        }

        .wine-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .wine-card:hover .wine-actions {
            opacity: 1;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid rgba(74,46,53,0.6);
            color: var(--text-muted);
            width: 30px;
            height: 30px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover { color: var(--creme); border-color: var(--creme); }
        .btn-icon.delete:hover { color: #E05060; border-color: #E05060; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            grid-column: 1 / -1;
        }

        .empty-icon { font-size: 5rem; margin-bottom: 1.5rem; opacity: 0.3; }
        .empty-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .empty-sub { color: var(--text-muted); font-size: 1rem; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(13,6,8,0.92);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--gris-moyen);
            border: 1px solid rgba(201,168,76,0.25);
            width: 550px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2.5rem;
            transform: translateY(20px);
            transition: transform 0.3s;
            position: relative;
        }

        .modal-overlay.open .modal { transform: translateY(0); }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--creme);
            margin-bottom: 0.3rem;
        }

        .modal-subtitle {
            font-size: 0.8rem;
            color: var(--or);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--gris);
            border: 1px solid rgba(74,46,53,0.6);
            color: var(--text-main);
            padding: 0.7rem 0.9rem;
            font-family: 'Crimson Pro', serif;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--or);
        }

        .form-group select option { background: var(--gris); }

        /* Prix estimé dans le formulaire */
        .prix-estimate-box {
            background: var(--gris);
            border: 1px solid rgba(201,168,76,0.2);
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .prix-estimate-box.visible { display: block; }

        .prix-estimate-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .prix-estimate-label { font-size: 0.8rem; color: var(--text-muted); }
        .prix-estimate-value { font-family: 'Playfair Display', serif; color: var(--or); font-size: 1.1rem; }

        .maturite-preview {
            padding: 0.6rem 0;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--bordeaux) 0%, var(--bordeaux-light) 100%);
            color: var(--creme);
            border: 1px solid rgba(201,168,76,0.3);
            padding: 0.9rem;
            font-family: 'Crimson Pro', serif;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--bordeaux-light) 0%, #A03040 100%);
            box-shadow: 0 5px 20px rgba(107,28,42,0.5);
        }

        .btn-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
        }

        .btn-close:hover { color: var(--creme); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--gris-moyen);
            border-left: 3px solid var(--or);
            padding: 1rem 1.5rem;
            font-size: 0.95rem;
            color: var(--text-main);
            z-index: 2000;
            transform: translateX(200%);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .toast.show { transform: translateX(0); }

        /* Décor */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
        }

        .divider-text {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-muted);
        }

        /* Loader */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            font-style: italic;
            grid-column: 1 / -1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .loading { animation: pulse 1.5s infinite; }

        @media (max-width: 768px) {
            header { padding: 1.2rem; flex-wrap: wrap; gap: 1rem; }
            main { padding: 1.5rem; }
            .header-stats { gap: 1.5rem; }
            .wine-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">🍷</div>
        <div class="logo-text">
            <h1>Cave à Vin</h1>
            <span>Ma Collection Privée</span>
        </div>
    </div>
    <div class="header-stats">
        <div class="stat-item">
            <span class="stat-value" id="stat-bouteilles">—</span>
            <span class="stat-label">Bouteilles</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-vins">—</span>
            <span class="stat-label">Références</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-valeur">—</span>
            <span class="stat-label">Valeur (€)</span>
        </div>
    </div>
    <button class="btn-add" onclick="openModal()">+ Ajouter un vin</button>
</header>

<main>
    <div class="filters">
        <button class="filter-btn active" data-filter="all">Tous</button>
        <button class="filter-btn" data-filter="Rouge">Rouges</button>
        <button class="filter-btn" data-filter="Blanc">Blancs</button>
        <button class="filter-btn" data-filter="Rosé">Rosés</button>
        <button class="filter-btn" data-filter="Mousseux">Mousseux</button>
        <button class="filter-btn" data-filter="apogee">À l'apogée ✨</button>
        <input type="text" class="search-box" placeholder="Rechercher un vin..." id="search-input">
    </div>

    <div class="section-divider">
        <div class="divider-line"></div>
        <span class="divider-text" id="wine-count">Chargement...</span>
        <div class="divider-line"></div>
    </div>

    <div class="wine-grid" id="wine-grid">
        <div class="loading">Ouverture de la cave...</div>
    </div>
</main>

<!-- Modal ajout -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <button class="btn-close" onclick="closeModal()">✕</button>
        <div class="modal-title" id="modal-title">Ajouter un vin</div>
        <div class="modal-subtitle">Fiche de référence</div>

        <form id="wine-form" onsubmit="submitForm(event)">
            <input type="hidden" id="edit-id">
            
            <div class="form-row">
                <div class="form-group" style="grid-column: span 2;">
                    <label>Nom du vin *</label>
                    <input type="text" id="f-nom" placeholder="Ex: Château Margaux" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Type</label>
                    <select id="f-type">
                        <option>Rouge</option>
                        <option>Blanc</option>
                        <option>Rosé</option>
                        <option>Mousseux</option>
                        <option>Liquoreux</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Millésime</label>
                    <input type="text" id="f-millesime" placeholder="Ex: 2015" pattern="[0-9]{4}" inputmode="numeric" maxlength="4" onchange="fetchWineInfo()">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Région</label>
                    <select id="f-region" onchange="fetchWineInfo()">
                        <option value="">Sélectionner...</option>
                        <option>Bordeaux</option>
                        <option>Bourgogne</option>
                        <option>Champagne</option>
                        <option>Rhône</option>
                        <option>Loire</option>
                        <option>Alsace</option>
                        <option>Toscane</option>
                        <option>Rioja</option>
                        <option>Napa Valley</option>
                        <option>Autre</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Appellation</label>
                    <input type="text" id="f-appellation" placeholder="Ex: Pauillac">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Cépage(s)</label>
                    <input type="text" id="f-cepage" placeholder="Ex: Cabernet Sauvignon">
                </div>
                <div class="form-group">
                    <label>Quantité</label>
                    <input type="number" id="f-quantite" value="1" min="1">
                </div>
            </div>

            <div class="form-group">
                <label>Prix d'achat (€)</label>
                <input type="number" id="f-prix" placeholder="0.00" step="0.01" min="0">
            </div>

            <!-- Box info automatique -->
            <div class="prix-estimate-box" id="estimate-box">
                <div class="prix-estimate-row">
                    <span class="prix-estimate-label">Note du millésime</span>
                    <span class="prix-estimate-value" id="est-note">—</span>
                </div>
                <div class="prix-estimate-row">
                    <span class="prix-estimate-label">Prix estimé (marché)</span>
                    <span class="prix-estimate-value" id="est-prix">—</span>
                </div>
                <div class="maturite-preview">
                    <div class="maturite-label">
                        <span class="maturite-status" id="est-statut-label">—</span>
                        <span class="maturite-age" id="est-age">—</span>
                    </div>
                    <div class="maturite-bar-bg">
                        <div class="maturite-bar-fill" id="est-bar" style="width:0%"></div>
                    </div>
                    <div class="maturite-apogee" id="est-conseil">—</div>
                </div>
            </div>

            <div class="form-group">
                <label>Notes personnelles</label>
                <textarea id="f-note" rows="2" placeholder="Arômes, accords mets-vins..."></textarea>
            </div>

            <button type="submit" class="btn-primary">Enregistrer dans la cave</button>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';  // même origin nginx

let allWines = [];
let currentFilter = 'all';
let currentSearch = '';

async function loadWines() {
    try {
        const res = await fetch('/api/vins');
        allWines = await res.json();
        renderWines();
        loadStats();
    } catch(e) {
        document.getElementById('wine-grid').innerHTML = '<div class="loading">Erreur de connexion à la cave...</div>';
    }
}

async function loadStats() {
    try {
        const res = await fetch('/api/stats');
        const stats = await res.json();
        document.getElementById('stat-bouteilles').textContent = stats.total_bouteilles;
        document.getElementById('stat-vins').textContent = stats.total_vins;
        document.getElementById('stat-valeur').textContent = stats.valeur_estimee ? stats.valeur_estimee.toFixed(0) + ' €' : '—';
    } catch(e) {}
}

function renderWines() {
    let wines = allWines;

    if (currentFilter !== 'all' && currentFilter !== 'apogee') {
        wines = wines.filter(w => w.type_vin === currentFilter);
    }
    if (currentFilter === 'apogee') {
        wines = wines.filter(w => w.maturite && w.maturite.statut === 'apogee');
    }
    if (currentSearch) {
        const q = currentSearch.toLowerCase();
        wines = wines.filter(w =>
            w.nom.toLowerCase().includes(q) ||
            (w.region || '').toLowerCase().includes(q) ||
            (w.appellation || '').toLowerCase().includes(q)
        );
    }

    document.getElementById('wine-count').textContent = `${wines.length} référence${wines.length > 1 ? 's' : ''}`;

    if (wines.length === 0) {
        document.getElementById('wine-grid').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🍾</div>
                <div class="empty-title">La cave est vide</div>
                <div class="empty-sub">Ajoutez votre première bouteille pour commencer votre collection</div>
            </div>`;
        return;
    }

    const html = wines.map(vin => createWineCard(vin)).join('');
    document.getElementById('wine-grid').innerHTML = html;
}

function createWineCard(vin) {
    const badgeClass = {
        'Rouge': 'badge-rouge',
        'Blanc': 'badge-blanc',
        'Rosé': 'badge-rose',
        'Mousseux': 'badge-mousseux',
        'Liquoreux': 'badge-blanc'
    }[vin.type_vin] || 'badge-rouge';

    const m = vin.maturite;
    const maturiteHtml = m ? `
        <div class="maturite-section">
            <div class="maturite-label">
                <span class="maturite-status" style="color:${m.couleur}">${m.label}</span>
                <span class="maturite-age">${m.age} ans</span>
            </div>
            <div class="maturite-bar-bg">
                <div class="maturite-bar-fill" style="width:${m.pourcentage}%; background:${m.couleur}"></div>
            </div>
            <div class="maturite-apogee">Apogée ${m.apogee_debut}–${m.apogee_fin}</div>
        </div>
        <div class="millesime-score">
            <span class="score-stars">${'★'.repeat(Math.round(m.note_millesime / 20))}${'☆'.repeat(5 - Math.round(m.note_millesime / 20))}</span>
            <span class="score-number">Millésime ${m.note_millesime}/100</span>
        </div>
    ` : '';

    const prixMarche = vin.prix_estime
        ? `<span class="prix-marche-label">Valeur marché estimée</span>
           <span class="prix-marche">~${vin.prix_estime} €</span>`
        : `<span class="prix-marche-label">Valeur marché</span>
           <span class="prix-marche" style="color:var(--text-muted);font-size:.85rem">Non disponible</span>`;
    const prixAchat = vin.prix_achat
        ? `<span class="prix-achat">Acheté <span>${vin.prix_achat} €</span></span>`
        : '';
    const prix = prixMarche + prixAchat;

    return `
        <div class="wine-card">
            <div class="wine-card-header">
                <span class="wine-type-badge ${badgeClass}">${vin.type_vin}</span>
                <span class="wine-qty"><span>${vin.quantite}</span> btl</span>
            </div>
            <span class="wine-millesime">${vin.millesime || '—'}</span>
            <div class="wine-name">${vin.nom}</div>
            <div class="wine-region">${[vin.appellation, vin.region].filter(Boolean).join(' · ') || 'Région non renseignée'}</div>
            ${maturiteHtml}
            <div class="wine-footer">
                <div class="wine-prix">${prix}</div>
                <div class="wine-actions">
                    <button class="btn-icon" onclick="editWine(${vin.id})" title="Modifier">✎</button>
                    <button class="btn-icon delete" onclick="deleteWine(${vin.id})" title="Supprimer">✕</button>
                </div>
            </div>
        </div>
    `;
}

// Filtres
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderWines();
    });
});

document.getElementById('search-input').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderWines();
});

// Modal
function openModal(editData = null) {
    const modal = document.getElementById('modal');
    document.getElementById('modal-title').textContent = editData ? 'Modifier ce vin' : 'Ajouter un vin';
    
    if (editData) {
        document.getElementById('edit-id').value = editData.id;
        document.getElementById('f-nom').value = editData.nom || '';
        document.getElementById('f-type').value = editData.type_vin || 'Rouge';
        document.getElementById('f-millesime').value = editData.millesime || '';
        document.getElementById('f-region').value = editData.region || '';
        document.getElementById('f-appellation').value = editData.appellation || '';
        document.getElementById('f-cepage').value = editData.cepage || '';
        document.getElementById('f-quantite').value = editData.quantite || 1;
        document.getElementById('f-prix').value = editData.prix_achat || '';
        document.getElementById('f-note').value = editData.note || '';
        if (editData.millesime && editData.region) fetchWineInfo();
    } else {
        document.getElementById('wine-form').reset();
        document.getElementById('edit-id').value = '';
        document.getElementById('f-quantite').value = 1;
        document.getElementById('estimate-box').classList.remove('visible');
    }
    
    modal.classList.add('open');
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
});

async function fetchWineInfo() {
    const millesime = document.getElementById('f-millesime').value;
    const region = document.getElementById('f-region').value;
    const type = document.getElementById('f-type').value;
    const nom = document.getElementById('f-nom').value;
    
    if (!millesime || !region) return;

    try {
        const res = await fetch('/api/recherche-vin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nom, millesime: parseInt(millesime), region, type_vin: type })
        });
        const data = await res.json();
        
        const box = document.getElementById('estimate-box');
        box.classList.add('visible');
        
        if (data.prix) {
            document.getElementById('est-prix').textContent = data.prix.prix_estime ? `${data.prix.prix_estime} €` : '—';
            document.getElementById('est-note').textContent = data.prix.note_millesime ? `${data.prix.note_millesime}/100` : '—';
        }
        
        if (data.maturite) {
            const m = data.maturite;
            document.getElementById('est-statut-label').textContent = m.label;
            document.getElementById('est-statut-label').style.color = m.couleur;
            document.getElementById('est-age').textContent = `${m.age} ans`;
            document.getElementById('est-bar').style.width = m.pourcentage + '%';
            document.getElementById('est-bar').style.background = m.couleur;
            document.getElementById('est-conseil').textContent = m.conseil;
        }
    } catch(e) {}
}

async function submitForm(e) {
    e.preventDefault();
    const editId = document.getElementById('edit-id').value;
    
    const data = {
        nom: document.getElementById('f-nom').value,
        type_vin: document.getElementById('f-type').value,
        millesime: parseInt(document.getElementById('f-millesime').value) || null,
        region: document.getElementById('f-region').value,
        appellation: document.getElementById('f-appellation').value,
        cepage: document.getElementById('f-cepage').value,
        quantite: parseInt(document.getElementById('f-quantite').value) || 1,
        prix_achat: parseFloat(document.getElementById('f-prix').value) || null,
        note: document.getElementById('f-note').value,
    };

    const url = editId ? `/api/vins/${editId}` : '/api/vins';
    const method = editId ? 'PUT' : 'POST';
    
    await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    
    closeModal();
    showToast(editId ? 'Vin modifié avec succès' : 'Vin ajouté à la cave 🍷');
    loadWines();
}

function editWine(id) {
    const wine = allWines.find(w => w.id === id);
    if (wine) openModal(wine);
}

async function deleteWine(id) {
    if (!confirm('Retirer cette bouteille de la cave ?')) return;
    await fetch(`/api/vins/${id}`, { method: 'DELETE' });
    showToast('Bouteille retirée de la cave');
    loadWines();
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// Init
loadWines();
</script>
</body>
</html>
