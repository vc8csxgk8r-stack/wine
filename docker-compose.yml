version: '3.8'

services:

  cave-backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - cave-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  cave-frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      cave-backend:
        condition: service_healthy

volumes:
  cave-data:
    driver: local
